<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .center{
            text-align: center;
        }
    </style>
</head>
<body>
<div class="center">
    <h1>用户登录页面</h1>
    <img src="/image/IMG_3980.jpg" alt="" width="200px"><br>
    请输入用户名:<input type="text" id="user_name"><br>
    请输入密码:&nbsp;&nbsp;<input type="password" id="password"><br>
    <button onclick="login()">登陆</button>
    <button onclick="reset()">重置</button>
    <br>
    <div style="text-align: right; margin-right: 30px;">
        还没有账户，点击此处进行注册👉<button onclick="register()">注册</button>
    </div>
</div>
<script>
    function login(){
        let name=document.getElementById("user_name").value;
        let password=document.getElementById("password").value;
        fetch('http://localhost:8080/user/load?name='+name+'&password='+password)
            .then(res=>res.json())
            .then(data=>{
                if(data==1){
                    alert("登陆成功")
                    window.location.href='book_yemian的副本.html'
                }else{
                    alert("用户名或密码错误")
                }
            })
    }
    // 重置
    function reset() {
        document.getElementById("user_name").value = "";
        document.getElementById("password").value = "";
    }
    function register(){
        window.location.href='user_register.html'
    }
</script>

</body>
</html>
