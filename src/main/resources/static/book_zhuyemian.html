<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 左上角图片 */
        .top-img {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 100px; /* 你可以改大小 */
            height: auto;
        }

        .center{
            text-align: center;
        }
        /* 基础表格样式，优化排版 */
        table {
            width: 100%;
            margin: 20px auto;
            border-collapse: collapse; /* 合并边框 */
            text-align: center;
            border: 0;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            border: 0;
        }
        th {
            background-color: #f5f5f5;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9; /* 偶数行灰色 */
        }
        tr:nth-child(odd) {
            background-color: white; /* 奇数行白色 */
        }
        h1 {
            color: #333;
            text-align: center;
            margin-top: 50px; /* 避免被图片挡住 */
        }
    </style>
</head>
<body>

<!-- 左上角图片 -->
<img src="/image/IMG_3971.jpg" alt="" class="top-img">

<h1>所有图书如表</h1>

<table>
    <tr>
        <th>ID</th>
        <th>图书名称</th>
        <th>所在位置</th>
        <th>状态</th>
    </tr>
    <tbody id="bookTable">

    </tbody>
</table>

<div class="center">
    <button onclick="returnlast()">返回上一页</button>
</div>

<script>
    fetch('http://localhost:8080/book/allbooks')
        .then(respon=>respon.json())
        .then(data=>{
            const bookTable=document.getElementById('bookTable');
            data.forEach(book=>{
                const tr=document.createElement('tr');
                tr.innerHTML=`
                    <td>${book.bookId}</td>
                    <td>${book.bookName}</td>
                    <td>${book.bookPlace}</td>
                    <td>${book.bookState}</td>
                `;
                bookTable.appendChild(tr);
            })
        })

    function returnlast(){
        window.location.href='book_yemian的副本.html'
    }
</script>
</body>
</html>
