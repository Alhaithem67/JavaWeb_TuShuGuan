<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
        }
        /* 最外层容器：实现 左图 + 右按钮 并排 */
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        /* 按钮区域：垂直排列按钮 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 按钮样式 */
        .button{
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #42b983;
            color: white;
            width: 180px;
        }
    </style>
</head>
<body>
<h1>主页面</h1>

<!-- 左图 + 右按钮 布局 -->
<div class="container">
    <!-- 左边图片 -->
    <img src="/image/IMG_3969.jpg" alt="图片" width="200">

    <!-- 右边按钮组 -->
    <div class="button-group">
        <button class="button" onclick="window.location.href='book_zhuyemian.html'">查看所有图书</button>
        <button class="button" onclick="window.location.href='book_selectById的副本.html'">查询指定图书</button>
        <button class="button" onclick="window.location.href='book_borrowBook.html'">借阅图书</button>
        <button class="button" onclick="window.location.href='book_returnBook.html'">归还图书</button>
    </div>
</div>
</body>
</html>
